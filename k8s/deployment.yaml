apiVersion: apps/v1
kind: Deployment
metadata:
  name: kanban-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kanban-app
  template:
    metadata:
      labels:
        app: kanban-app
    spec:
      containers:
        - name: kanban-app
          image: ghcr.io/ripisopol/kanban-app:latest
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: data
              mountPath: /app/data
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kanban-secret
                  key: SECRET_KEY
      volumes:
        - name: data
          hostPath:
            path: /data/kanban
            type: DirectoryOrCreate