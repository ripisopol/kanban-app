apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kanban-app
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: kanban.rizalsolihin.my.id
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kanban-app
                port:
                  number: 80